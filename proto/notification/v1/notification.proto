syntax = "proto3";

package notification.v1;

// go_package tells protoc where to put the generated Go files.
// Format: "<import path>;<package name>"
option go_package = "github.com/lalithlochan/nimbus/proto/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

// NotificationService is the gRPC contract for internal callers.
//
// Design decision: why expose BOTH gRPC and REST?
// - REST /v1/notifications → external clients (browsers, 3rd-party)
// - gRPC NotificationService → internal microservices
//
// gRPC gives internal callers: strong typing (protobuf), lower overhead
// (binary vs JSON), and most importantly — server-streaming RPCs, which
// let a caller subscribe to live delivery updates without polling.
//
// Think of it this way: REST is the public front door, gRPC is the
// internal hallway between your own services.
service NotificationService {
  // CreateNotification enqueues a notification for delivery.
  // Mirrors POST /v1/notifications but with protobuf typing.
  // Unary RPC: client sends one request, gets one response.
  rpc CreateNotification(CreateNotificationRequest) returns (CreateNotificationResponse);

  // GetNotification retrieves a single notification by ID.
  // Unary RPC: simple request/response.
  rpc GetNotification(GetNotificationRequest) returns (Notification);

  // StreamDeliveryUpdates streams real-time delivery status updates.
  //
  // Server-streaming RPC: client sends ONE request (the notification ID),
  // server pushes MULTIPLE responses as the status changes.
  // Stream closes automatically when notification reaches a terminal state
  // (sent / failed / dead_letter).
  //
  // Interview talking point:
  // "Instead of polling GET /notifications/{id} every 2 seconds from the
  //  client side, I inverted the model — the server pushes updates over
  //  a persistent HTTP/2 stream. This cuts unnecessary network traffic
  //  by ~90% for in-flight notifications."
  rpc StreamDeliveryUpdates(StreamDeliveryUpdatesRequest) returns (stream DeliveryUpdate);
}

// ── Request / Response messages ──────────────────────────────────────────────

message CreateNotificationRequest {
  string tenant_id = 1; // UUID: which tenant owns this notification
  string user_id   = 2; // UUID: which user triggered it
  string channel   = 3; // "email" | "sms" | "webhook"
  bytes  payload   = 4; // JSON: channel-specific payload ({"to":...,"body":...})
}

message CreateNotificationResponse {
  string id        = 1; // UUID of the created notification
  string status    = 2; // Always "pending" on creation
  google.protobuf.Timestamp created_at = 3;
}

message GetNotificationRequest {
  string id = 1; // UUID of the notification to fetch
}

// Notification is the full representation of a notification record.
message Notification {
  string id        = 1;
  string tenant_id = 2;
  string user_id   = 3;
  string channel   = 4;
  string status    = 5; // pending | processing | sent | failed
  int32  attempt   = 6; // how many delivery attempts so far
  string error_msg = 7; // last error (if failed)
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message StreamDeliveryUpdatesRequest {
  string notification_id = 1; // UUID to watch
}

// DeliveryUpdate is one push event in the server-streaming RPC.
// The client accumulates these to track delivery progress.
message DeliveryUpdate {
  string notification_id = 1;
  string status          = 2; // current status
  int32  attempt         = 3; // which attempt this reflects
  string error_message   = 4; // populated when status = "failed"
  google.protobuf.Timestamp updated_at = 5;
}
